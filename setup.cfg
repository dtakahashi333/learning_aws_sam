[flake8]
max-line-length = 170
# ignore = E203, W503

[pylint]
# Maximum allowed line length
max-line-length = 170

# Disable some common warnings
# disable = C0114, C0116, R0903
disable = W0105, W0212

[tool.black]
line-length = 170
target-version = ['py313']

[mypy-dashscope]
ignore_missing_imports = True