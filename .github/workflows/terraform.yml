name: Terraform Lint & Validate

on:
  push:
    branches:
      - main
    paths:
      - docker/**
      - .github/workflows/terraform.yml
  pull_request:
    branches:
      - main
    paths:
      - docker/**
      - .github/workflows/terraform.yml

jobs:
  terraform:
    name: Terraform Lint & Validate
    runs-on: ubuntu-latest

    # Use the Bash shell regardless whether the GitHub Actions runner is ubuntu-latest, macos-latest, or windows-latest
    defaults:
      run:
        shell: bash

    steps:
      # Checkout the repository to the GitHub Actions runner
      - name: Checkout code
        uses: actions/checkout@v6

      # Install the latest version of Terraform CLI and configure the Terraform CLI configuration file with a Terraform Cloud user API token
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.7

      # Postgres folder
      - name: Terraform Format Check (PostgreSQL)
        run: terraform -chdir=docker/postgres fmt -check

      - name: Terraform Init (PostgreSQL)
        run: terraform -chdir=docker/postgres init -backend=false

      - name: Terraform Validate (PostgreSQL)
        run: terraform -chdir=docker/postgres validate

      - name: Terraform Plan (PostgreSQL)
        run: terraform -chdir=docker/postgres plan -var="db_password=${{ secrets.DB_PASSWORD }}"

      # Qdrant folder
      - name: Terraform Format Check (Qdrant)
        run: terraform -chdir=docker/qdrant fmt -check

      - name: Terraform Init (Qdrant)
        run: terraform -chdir=docker/qdrant init

      - name: Terraform Validate (Qdrant)
        run: terraform -chdir=docker/qdrant validate

      - name: Terraform Plan (Qdrant)
        run: terraform -chdir=docker/qdrant plan

      - name: TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: v0.61.0

      # Postgres folder
      - name: TFLint (Postgres)
        run: tflint --init && tflint
        working-directory: docker/postgres

      # Qdrant folder
      - name: TFLint (Qdrant)
        run: tflint --init && tflint
        working-directory: docker/qdrant
