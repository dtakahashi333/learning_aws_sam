# GitHub Actions example
name: Python Lint

on:
  push:
    branches:
      - main
    paths:
      - hello_world/**
  pull_request:
    branches:
      - main
    paths:
      - hello_world/**

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r hello_world/requirements.txt
      - name: Run linters
        run: |
          flake8 hello_world/.
          black --check hello_world/.
          isort --check-only hello_world/.
          mypy hello_world/.
